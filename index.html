<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue.js 課程練習工作坊</title>
    <style>
        :root {
            --sidebar-width: 280px;
            --primary-color: #42b883;
            --dark-color: #35495e;
            --bg-light: #f8f9fa;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-light);
        }
        /* 側邊欄樣式 */
        aside {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 5px rgba(0,0,0,0.05);
            z-index: 10;
        }
        .sidebar-header {
            padding: 25px;
            background: var(--dark-color);
            color: white;
        }
        .sidebar-header h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }
        .student-id {
            margin-top: 8px;
            font-size: 0.85rem;
            color: var(--primary-color);
            font-weight: bold;
        }
        nav {
            flex: 1;
            overflow-y: auto;
            padding: 15px 0;
        }
        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        nav li {
            margin: 4px 15px;
        }
        nav a {
            text-decoration: none;
            color: #555;
            display: block;
            padding: 12px 15px;
            border-radius: 8px;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        nav a:hover {
            background-color: #f0fdf4;
            color: var(--primary-color);
            transform: translateX(5px);
        }
        nav a.active {
            background-color: var(--primary-color);
            color: white;
        }
        /* 主內容區樣式 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #eee;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <h1>Vue.js 基礎練習</h1>
            <div class="student-id">學號：413730630</div>
        </div>
        <nav>
            <ul id="menu">
                <li><a href="ex1/index.html" target="content-frame">Ex 1: 基礎計數器</a></li>
                <li><a href="ex2/index.html" target="content-frame">Ex 2: 資料渲染</a></li>
                <li><a href="ex3/index.html" target="content-frame">Ex 3: 方法與事件</a></li>
                <li><a href="ex4/index.html" target="content-frame">Ex 4: 表單 v-model</a></li>
                <li><a href="ex5/index.html" target="content-frame">Ex 5: 條件渲染</a></li>
                <li><a href="ex6/index.html" target="content-frame">Ex 6: 列表渲染</a></li>
                <li><a href="ex7/index.html" target="content-frame">Ex 7: 計算屬性</a></li>
                <li><a href="ex8/index.html" target="content-frame">Ex 8: 動態樣式</a></li>
                <li><a href="ex9/index.html" target="content-frame">Ex 9: 待辦事項清單</a></li>
            </ul>
        </nav>
    </aside>
    <main>
        <iframe name="content-frame" src="ex1/index.html"></iframe>
    </main>

    <script>
        // 簡單的腳本：點擊時切換 Active 狀態
        const links = document.querySelectorAll('#menu a');
        links.forEach(link => {
            link.addEventListener('click', function() {
                links.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
            });
        });
        // 預設第一個選單為 active
        if(links.length > 0) links[0].classList.add('active');
    </script>
</body>
</html>
